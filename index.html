<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC-Signal Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f4f0;
        }
        .tab-content { display: none !important; }
        .tab-content.active { display: block !important; }
    </style>
</head>
<body class="flex flex-col min-h-screen max-w-md mx-auto bg-[#fdfcf7] shadow-xl relative pb-28">

    <!-- Header Banner -->
    <header class="px-5 pt-4 pb-2 space-y-3 select-none">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">SMC-Signal <span class="text-gray-400 font-normal text-lg">Pro</span></h1>
            <div class="flex items-center gap-2">
                <span id="activeSessionBadge" class="inline-flex items-center px-2.5 py-1 rounded-md text-[10px] font-black bg-slate-900 text-white tracking-wider border border-slate-800 uppercase">
                    MONITORING SESSIONS
                </span>
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold bg-emerald-50 text-emerald-600 border border-emerald-200">
                    <span class="w-1.5 h-1.5 mr-1 bg-emerald-500 rounded-full animate-pulse"></span>LIVE
                </span>
            </div>
        </div>
        <div class="bg-white border border-stone-200/60 rounded-xl p-3 flex justify-between items-center shadow-xs">
            <span class="text-xs font-bold text-stone-500 uppercase tracking-wider">Live Market Monitor</span>
            <span id="liveClock" class="text-xs font-mono font-black text-slate-800">00:00:00 UTC</span>
        </div>
    </header>

    <!-- ================= SIGNALS TAB ================= -->
    <main id="signalsTab" class="tab-content active flex-1 px-5 space-y-5">
        
        <!-- Asset Filter Card -->
        <div class="bg-white border border-stone-200/60 rounded-xl p-4 shadow-xs">
            <label class="block text-[10px] font-black text-stone-400 uppercase tracking-wider mb-1">Asset Pair</label>
            <div class="relative">
                <select id="assetPair" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-2.5 py-2 text-xs font-bold text-slate-800 focus:outline-none appearance-none">
                    <option value="XAUUSD (Gold)">XAUUSD (Gold)</option>
                    <option value="BTCUSD (Bitcoin)">BTCUSD (Bitcoin)</option>
                    <option value="EURUSD">EURUSD</option>
                    <option value="GBPUSD">GBPUSD</option>
                    <option value="USDJPY">USDJPY</option>
                    <option value="AUDUSD">AUDUSD</option>
                    <option value="USDCAD">USDCAD</option>
                    <option value="USDCHF">USDCHF</option>
                    <option value="NZDUSD">NZDUSD</option>
                </select>
            </div>
        </div>

        <!-- Multi-Timeframe Charts Grid Selector -->
        <div class="space-y-2">
            <h2 class="text-[11px] font-black text-stone-400 uppercase tracking-widest px-1">Multi-Timeframe Charts</h2>
            <div class="grid grid-cols-2 gap-3">
                <!-- Daily Slot -->
                <label for="upload-daily" class="bg-white border border-dashed border-stone-300 rounded-xl p-4 text-center cursor-pointer hover:bg-stone-50 block transition shadow-xs">
                    <h4 class="text-xs font-black text-slate-800">Daily</h4>
                    <p id="status-daily" class="text-[10px] text-stone-400 font-bold mt-1">Tap to Upload</p>
                    <input type="file" id="upload-daily" accept="image/png, image/jpeg" class="hidden" onchange="processTimeframeChart(event, 0, 'daily')">
                </label>

                <!-- 4H Slot -->
                <label for="upload-4h" class="bg-white border border-dashed border-stone-300 rounded-xl p-4 text-center cursor-pointer hover:bg-stone-50 block transition shadow-xs">
                    <h4 class="text-xs font-black text-slate-800">4H</h4>
                    <p id="status-4h" class="text-[10px] text-stone-400 font-bold mt-1">Tap to Upload</p>
                    <input type="file" id="upload-4h" accept="image/png, image/jpeg" class="hidden" onchange="processTimeframeChart(event, 1, '4h')">
                </label>

                <!-- 1H Slot -->
                <label for="upload-1h" class="bg-white border border-dashed border-stone-300 rounded-xl p-4 text-center cursor-pointer hover:bg-stone-50 block transition shadow-xs">
                    <h4 class="text-xs font-black text-slate-800">1H</h4>
                    <p id="status-1h" class="text-[10px] text-stone-400 font-bold mt-1">Tap to Upload</p>
                    <input type="file" id="upload-1h" accept="image/png, image/jpeg" class="hidden" onchange="processTimeframeChart(event, 2, '1h')">
                </label>

                <!-- 15M Entry Slot -->
                <label for="upload-15m" class="bg-white border border-dashed border-stone-300 rounded-xl p-4 text-center cursor-pointer hover:bg-stone-50 block transition shadow-xs">
                    <h4 class="text-xs font-black text-slate-800">15M (Entry)</h4>
                    <p id="status-15m" class="text-[10px] text-stone-400 font-bold mt-1">Tap to Upload</p>
                    <input type="file" id="upload-15m" accept="image/png, image/jpeg" class="hidden" onchange="processTimeframeChart(event, 3, '15m')">
                </label>
            </div>
        </div>

        <!-- Strategy Run Processing Button -->
        <div class="space-y-3">
            <button id="validateBtn" onclick="handleValidation()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 px-4 rounded-xl transition duration-200 shadow-md active:scale-[0.99] cursor-pointer text-center text-xs tracking-wider uppercase">
                Run Strategy Validation
            </button>
            <div class="flex items-center justify-center gap-2 text-xs font-bold text-stone-500 py-1 border-b border-stone-200/40">
                ⚡ <span id="statusText">Ready for matrix structure analysis...</span>
            </div>
        </div>

        <!-- Strategy Verification Output Logs -->
        <div class="space-y-2">
            <h2 class="text-[11px] font-black text-stone-400 uppercase tracking-widest px-1">Analysis Evaluation</h2>
            <div class="bg-white border border-stone-200/60 shadow-xs rounded-xl p-4 min-h-[90px]">
                <div id="evaluationOutput" class="text-xs font-medium text-stone-600 leading-relaxed space-y-3">
                    <p>Awaiting structural input mapping data...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ================= AUTOMATIC JOURNAL TAB ================= -->
    <main id="journalTab" class="tab-content flex-1 px-5 space-y-4">
        <div class="flex justify-between items-center select-none pt-2">
            <h2 class="text-[11px] font-black text-stone-400 uppercase tracking-widest">Trading Journal Log</h2>
            <button onclick="clearJournalLogs()" class="text-[10px] bg-red-50 text-red-600 font-bold px-2 py-1 rounded border border-red-100 cursor-pointer">Clear Logs</button>
        </div>
        <div id="journalEntriesList" class="space-y-3"></div>
    </main>

    <!-- ================= SETTINGS CONFIGURATION ================= -->
    <main id="settingsTab" class="tab-content flex-1 px-5 space-y-4">
        <h2 class="text-[11px] font-black text-stone-400 uppercase tracking-widest pt-2">Configuration Engine</h2>
        <div class="bg-white border border-stone-200/60 rounded-xl p-4 shadow-xs space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">Groq API Token Key</label>
                <input id="apiKeyInput" type="text" oninput="saveApiKey(this.value)" placeholder="gsk_xxxxxxxxxxxxxxxx" class="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2 text-xs font-mono text-slate-800 focus:outline-none">
            </div>
        </div>
    </main>

    <!-- Navigation Global Menu Action Dock Footer -->
    <nav class="absolute bottom-0 left-0 right-0 bg-white border-t border-stone-200/60 px-8 py-3 flex justify-between items-center select-none z-50">
        <button id="nav-signals" onclick="switchTab('signals')" class="nav-btn flex flex-col items-center gap-1 text-slate-900 font-black">
            <i data-lucide="zap" class="w-5 h-5 stroke-[2.5]"></i>
            <span class="text-[10px] tracking-wider uppercase">Signals</span>
        </button>
        <button id="nav-journal" onclick="switchTab('journal')" class="nav-btn flex flex-col items-center gap-1 text-gray-400 font-bold hover:text-slate-900">
            <i data-lucide="book-open" class="w-5 h-5"></i>
            <span class="text-[10px] tracking-wider uppercase">Journal</span>
        </button>
        <button id="nav-settings" onclick="switchTab('settings')" class="nav-btn flex flex-col items-center gap-1 text-gray-400 font-bold hover:text-slate-900">
            <i data-lucide="settings" class="w-5 h-5"></i>
            <span class="text-[10px] tracking-wider uppercase">Settings</span>
        </button>
    </nav>

    <script>
        let targetLiveCharts = [
            "iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAG0lEQVR42mNkYGD4DwYMDAwM4MIEBv6DwA8A7vYCBXas3mAAAAAElFTkSuQmCC",
            "iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAG0lEQVR42mNkYGD4DwYMDAwM4MIEBv6DwA8A7vYCBXas3mAAAAAElFTkSuQmCC",
            "iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAG0lEQVR42mNkYGD4DwYMDAwM4MIEBv6DwA8A7vYCBXas3mAAAAAElFTkSuQmCC",
            "iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAG0lEQVR42mNkYGD4DwYMDAwM4MIEBv6DwA8A7vYCBXas3mAAAAAElFTkSuQmCC"
        ];

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            loadSavedApiKey();
            renderJournalLogs();
            updateLiveClock();
            setInterval(updateLiveClock, 1000);
        });

        function processTimeframeChart(event, indexPosition, idLabel) {
            const file = event.target.files[0];
            const labelElement = document.getElementById(`status-${idLabel}`);
            if (!file) return;

            labelElement.innerText = "Encoding...";
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const base64DataRaw = e.target.result.split(',')[1];
                targetLiveCharts[indexPosition] = base64DataRaw;
                labelElement.innerText = "Loaded ✓";
                labelElement.className = "text-[10px] text-emerald-600 font-black mt-1";
            };
            reader.readAsDataURL(file);
        }

        async function handleValidation() {
            const btn = document.getElementById("validateBtn");
            const statusText = document.getElementById("statusText");
            const output = document.getElementById("evaluationOutput");
            const pair = document.getElementById("assetPair").value;
            const savedToken = localStorage.getItem("smc_groq_api_token");

            if (!savedToken) {
                statusText.innerText = "Execution failed.";
                output.innerHTML = `<span class="text-red-500 font-bold">Error: API Key is missing.</span> Add it in Settings.`;
                return;
            }

            btn.disabled = true;
            btn.className = "w-full bg-stone-200 text-stone-400 font-bold py-3.5 px-4 rounded-xl cursor-not-allowed text-center text-xs uppercase tracking-wider";
            btn.innerText = "Analyzing multi-timeframe arrays...";
            statusText.innerText = "Processing execution tokens...";

            try {
                const responseText = await sendToGroq(targetLiveCharts, pair, savedToken);
                statusText.innerText = "Analysis matrix synchronized.";
                
                let formattedText = responseText.replace(/FINAL RECOMMENDATION:/g, '<div class="mt-4 pt-3 border-t border-stone-200 font-black text-slate-950 text-sm uppercase tracking-wider">🎯 Final Recommendation:</div>');
                output.innerHTML = `<div class="space-y-2">${formattedText}</div>`;
                
                registerJournalEntry(pair, "AUTONOMOUS", responseText);
            } catch (error) {
                statusText.innerText = "Execution failed.";
                output.innerText = `Error: ${error.message}`;
            } finally {
                btn.disabled = false;
                btn.className = "w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 px-4 rounded-xl transition duration-200 shadow-md active:scale-[0.99] cursor-pointer text-center text-xs tracking-wider uppercase";
                btn.innerText = "Run Strategy Validation";
            }
        }

        async function sendToGroq(images, assetPair, activeKey) {
            const imagePayload = images.map(b64 => ({
                type: "image_url",
                image_url: { url: `data:image/png;base64,${b64}` }
            }));

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${activeKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "meta-llama/llama-4-scout-17b-16e-instruct",
                    messages: [
                        {
                            role: "user",
                            content: [
                                {
                                    type: "text",
                                    text: `You are an extremely meticulous, precision-focused Smart Money Concepts (SMC) risk manager. Carefully scrutinize these 4 multi-timeframe charts for ${assetPair} across Daily, 4H, 1H, and 15M periods to generate highly valid institutional trade setups. You must be heavily skeptical: inspect order flow, liquidity pools, internal vs. swing structure breaks (BOS/CHoCH), mitigation blocks, and premium/discount zones. If the structural setups across timeframes do not map out flawlessly, or if the market is choppy, sideways, or ambiguous, you MUST issue a "NO TRADE (STAND DOWN)" recommendation. For execution setups to be valid, the Stop Loss must be exceptionally precise; you are STRICTLY FORBIDDEN from calculating a Stop Loss wider than a maximum of 65 pips. If a valid setup requires more than 65 pips of risk room to survive institutional invalidation, you MUST reject the trade completely and output "NO TRADE (STAND DOWN)". Conclude your analysis at the very bottom with a clear section starting exactly with "FINAL RECOMMENDATION:" followed strictly by either "EXECUTE A BUY ORDER", "EXECUTE A SELL ORDER", or "NO TRADE (STAND DOWN)". If executing a trade, list precise numeric data from the charts for Entry Price, Stop Loss (Max 65 pips), and Take Profit adhering to a strict 1:2 to 1:3 risk-to-reward matrix.`
                                },
                                ...imagePayload
                            ]
                        }
                    ],
                    temperature: 0.1,
                    max_completion_tokens: 650
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || "Failed API transaction");
            }
            const resData = await response.json();
            return resData.choices[0].message.content;
        }

        function updateLiveClock() {
            const now = new Date();
            const hour = now.getUTCHours();
            const pad = (num) => String(num).padStart(2, '0');
            document.getElementById("liveClock").innerText = `${pad(hour)}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())} UTC`;
            const badge = document.getElementById("activeSessionBadge");
            if (badge) {
                if (hour >= 7 && hour < 12) badge.innerText = "LONDON - ACTIVE";
                else if (hour >= 12 && hour < 16) badge.innerText = "LON / NY OVERLAP";
                else if (hour >= 16 && hour < 21) badge.innerText = "NEW YORK - HIGH";
                else badge.innerText = "ASIA / PACIFIC";
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-slate-900', 'font-black');
                btn.classList.add('text-gray-400', 'font-bold');
            });
            document.getElementById(`${tabName}Tab`).classList.add('active');
            const activeBtn = document.getElementById(`nav-${tabName}`);
            activeBtn.classList.remove('text-gray-400', 'font-bold');
            activeBtn.classList.add('text-slate-900', 'font-black');
            lucide.createIcons();
        }

        function saveApiKey(v) { localStorage.setItem("smc_groq_api_token", v.trim()); }
        function loadSavedApiKey() {
            const tk = localStorage.getItem("smc_groq_api_token");
            if (tk) document.getElementById("apiKeyInput").value = tk;
        }

        function registerJournalEntry(asset, bias, summary) {
            const logs = JSON.parse(localStorage.getItem("smc_trade_journal_vault") || "[]");
            const low = summary.toLowerCase();
            const pass = !low.includes("stand down") && !low.includes("no trade");
            logs.unshift({
                id: Date.now(),
                timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                assetPair: asset,
                intendedBias: bias,
                status: pass ? "VALID STRUCTURE" : "NO TRADE PASS",
                colorCode: pass ? "emerald" : "red",
                summaryText: summary.substring(0, 110) + "..."
            });
            localStorage.setItem("smc_trade_journal_vault", JSON.stringify(logs));
            renderJournalLogs();
        }

        function renderJournalLogs() {
            const list = document.getElementById("journalEntriesList");
            const logs = JSON.parse(localStorage.getItem("smc_trade_journal_vault") || "[]");
            if(logs.length === 0) {
                list.innerHTML = `<div class="text-center py-8 border border-dashed border-stone-200 rounded-xl bg-stone-50"><p class="text-xs font-bold text-stone-400">No logs saved yet.</p></div>`;
                return;
            }
            list.innerHTML = logs.map(log => `
                <div class="border-l-4 border-${log.colorCode}-500 pl-3 py-2 bg-white rounded-r-lg border border-stone-200/60 shadow-xs">
                    <div class="flex justify-between items-center">
                        <p class="text-[11px] font-black text-slate-800">${log.assetPair} — <span class="text-stone-500">${log.intendedBias}</span></p>
                        <span class="text-[9px] font-bold text-stone-400">${log.timestamp}</span>
                    </div>
                    <p class="text-[9px] font-black text-${log.colorCode}-600 tracking-wide mt-0.5 uppercase">${log.status}</p>
                    <p class="text-[10px] text-stone-500 mt-1 leading-normal">${log.summaryText}</p>
                </div>
            `).join('');
        }

        function clearJournalLogs() {
            localStorage.setItem("smc_trade_journal_vault", "[]");
            renderJournalLogs();
        }
    </script>
</body>
</html>
